# Patch the existing kagent-openai secret with your API key.
# The default-model-config already references this secret.
#
# Usage:
#   kubectl --context kind-abox create secret generic kagent-openai \
#     --from-literal=OPENAI_API_KEY="sk-..." \
#     -n kagent --dry-run=client -o yaml | kubectl --context kind-abox apply -f -
#
# Or for Anthropic, create a separate secret:
apiVersion: v1
kind: Secret
metadata:
  name: kagent-anthropic
  namespace: kagent
type: Opaque
stringData:
  ANTHROPIC_API_KEY: "REPLACE_WITH_YOUR_ANTHROPIC_API_KEY"
