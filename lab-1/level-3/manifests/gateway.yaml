---
# Gateway — managed by agentgateway via GatewayClass "agentgateway".
# Creates a proxy listener on port 80 that accepts routes from all namespaces.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: agentgateway-proxy
  namespace: agentgateway-system
spec:
  gatewayClassName: agentgateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
