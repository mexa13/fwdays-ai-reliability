---
# AgentgatewayBackend — Anthropic LLM provider.
# The Secret "anthropic-secret" holds the x-api-key header value.
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
spec:
  ai:
    provider:
      anthropic:
        model: claude-sonnet-4-6
  policies:
    auth:
      secretRef:
        name: anthropic-secret
