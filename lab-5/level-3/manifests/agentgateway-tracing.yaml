# Wire agentgateway's frontend tracing pipeline to the OTel Collector deployed
# in level-2 (which in turn forwards spans to Phoenix on port 4317).
#
# Upstream tutorial:
#   https://agentgateway.dev/docs/kubernetes/latest/tutorials/telemetry/
#
# We target `agentgateway-external` — the Gateway that ships with the abox
# stack (kagent + agentgateway via FluxCD). If you also ran lab-1/level-3 it
# created an additional `agentgateway-proxy` Gateway; switch targetRefs.name
# to that if you want to instrument that one instead.
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: tracing-to-phoenix
  namespace: agentgateway-system
spec:
  targetRefs:
    - kind: Gateway
      name: agentgateway-external
      group: gateway.networking.k8s.io
  frontend:
    tracing:
      backendRef:
        name: otel-collector
        namespace: phoenix
        port: 4317
      protocol: GRPC
      randomSampling: "true"
      # Add a service.name resource attribute so Phoenix groups these spans
      # under their own project instead of the catch-all `default`. Values are
      # CEL expressions — a static string literal needs the inner quotes.
      resources:
        - name: service.name
          expression: '"agentgateway"'
