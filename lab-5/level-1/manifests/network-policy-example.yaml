# Network-policies use case, adapted for agent-sandbox v0.4.6.
#
# Upstream docs at https://agent-sandbox.sigs.k8s.io/docs/use-cases/examples/network-policies/
# illustrate the pattern with an `AgenticSandbox` composite resource, but that
# kind is provided by a KRO ResourceGraphDefinition shipped in the upstream
# `dev/` tooling — it is NOT included in the v0.4.x release `extensions.yaml`.
# Instead of pulling KRO + an out-of-band RGD into the lab, we use the actual
# `Sandbox` CRD directly. The deny-all + allow-DNS NetworkPolicies are the
# point of the example regardless of which higher-level abstraction wraps the
# pod.
---
apiVersion: v1
kind: Namespace
metadata:
  name: a5-sandbox
  labels:
    app.kubernetes.io/part-of: lab-5
---
apiVersion: agents.x-k8s.io/v1alpha1
kind: Sandbox
metadata:
  name: demo
  namespace: a5-sandbox
spec:
  podTemplate:
    spec:
      containers:
      - name: tools
        # netshoot ships curl, nslookup, dig, etc. — handy for poking at the
        # network policies below. Swap for any image you want to sandbox.
        image: nicolaka/netshoot:latest
        command: ["sleep", "infinity"]
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
      restartPolicy: OnFailure
---
# Deny-by-default ingress and egress for every pod in the namespace.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all
  namespace: a5-sandbox
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
# Carve out the bare minimum the sandbox needs: DNS on 53/UDP + 53/TCP.
#
# We deliberately omit `to:` here. Earlier iterations pinned namespaceSelector
# (kubernetes.io/metadata.name=kube-system) and podSelector (k8s-app=kube-dns),
# but kindnet's NetworkPolicy implementation has historically been finicky with
# namespaceSelector matching — the rule would compile but match zero peers, so
# DNS stayed blocked even though deny-all worked. Dropping `to:` allows port
# 53/UDP+TCP to any destination, which on a kind cluster is effectively just
# CoreDNS in kube-system anyway. Tight enough for a sandbox lab.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: a5-sandbox
spec:
  podSelector: {}
  policyTypes:
  - Egress
  egress:
  - ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
