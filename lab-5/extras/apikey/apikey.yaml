# API key authentication on the agentgateway Gateway.
# Upstream: https://agentgateway.dev/docs/kubernetes/latest/security/apikey/
#
# Two resources: a Secret typed as `extauth.solo.io/apikey` (only the
# `api-key` field is meaningful) and an AgentgatewayPolicy in Strict mode.
# Strict means: requests without a valid key are rejected.
---
apiVersion: v1
kind: Secret
metadata:
  name: apikey
  namespace: agentgateway-system
  labels:
    app: lab-5
type: extauth.solo.io/apikey
stringData:
  # Lab-only — rotate before doing anything resembling production.
  api-key: N2YwMDIxZTEtNGUzNS1jNzgzLTRkYjAtYjE2YzRkZGVmNjcy
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: apikey-auth
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: agentgateway-proxy
  traffic:
    apiKeyAuthentication:
      mode: Strict
      secretRef:
        name: apikey
