# LLM HTTPRoute on the abox `agentgateway-external` Gateway — Anthropic flavor.
#
# Bundle:
#   Secret              anthropic-secret  (x-api-key from env)
#   AgentgatewayBackend anthropic         (provider=anthropic, claude-sonnet-4-6)
#   HTTPRoute           llm               (/v1/* → anthropic backend)
#   ReferenceGrant      llm-backend-access
#
# The placeholder __ANTHROPIC_KEY__ is substituted by `make llm-route-apply`.
---
apiVersion: v1
kind: Secret
metadata:
  name: anthropic-secret
  namespace: agentgateway-system
  labels:
    app: lab-5
type: Opaque
stringData:
  # agentgateway's BackendAuth.secretRef requires the field to be named exactly
  # `Authorization`. For Anthropic the value is the raw API key (no `Bearer `
  # prefix); the data plane substitutes it into the upstream `x-api-key` header.
  # OpenAI variant uses `Authorization: "Bearer ..."` instead — see the openai
  # YAML next door.
  Authorization: __ANTHROPIC_KEY__
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: anthropic
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  ai:
    provider:
      anthropic:
        model: claude-sonnet-4-6
  policies:
    auth:
      secretRef:
        name: anthropic-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: anthropic
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: llm-backend-access
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentgateway-system
  to:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
