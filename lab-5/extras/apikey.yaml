# API key authentication on the agentgateway Gateway.
# Upstream: https://agentgateway.dev/docs/kubernetes/latest/security/apikey/
#
# The `__APIKEY__` placeholder is substituted at apply time by the Makefile.
# Source of truth for the actual key is, in order: LAB5_API_KEY env var, then
# ./.apikey local file (auto-generated if missing). The committed YAML never
# contains a real secret.
---
apiVersion: v1
kind: Secret
metadata:
  name: apikey
  namespace: agentgateway-system
  labels:
    app: lab-5
type: extauth.solo.io/apikey
stringData:
  api-key: __APIKEY__
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayPolicy
metadata:
  name: apikey-auth
  namespace: agentgateway-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      # Matches the Gateway shipped with the abox stack. For lab-1/level-3
      # users, override to `agentgateway-proxy` in your apply pipeline.
      name: agentgateway-external
  traffic:
    apiKeyAuthentication:
      mode: Strict
      secretRef:
        name: apikey
