# LLM HTTPRoute on the abox `agentgateway-external` Gateway — OpenAI flavor.
#
# Bundle:
#   Secret              openai-secret     (Authorization: Bearer <key>)
#   AgentgatewayBackend openai            (provider=openai, gpt-4o-mini)
#   HTTPRoute           llm               (/v1/* → openai backend)
#   ReferenceGrant      llm-backend-access
#
# The placeholder __OPENAI_KEY__ is substituted by `make llm-route-apply`.
---
apiVersion: v1
kind: Secret
metadata:
  name: openai-secret
  namespace: agentgateway-system
  labels:
    app: lab-5
type: Opaque
stringData:
  Authorization: "Bearer __OPENAI_KEY__"
---
apiVersion: agentgateway.dev/v1alpha1
kind: AgentgatewayBackend
metadata:
  name: openai
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  ai:
    provider:
      openai:
        model: gpt-4o-mini
  policies:
    auth:
      secretRef:
        name: openai-secret
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: llm
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  parentRefs:
    - name: agentgateway-external
      namespace: agentgateway-system
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /v1
      backendRefs:
        - name: openai
          namespace: agentgateway-system
          group: agentgateway.dev
          kind: AgentgatewayBackend
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: llm-backend-access
  namespace: agentgateway-system
  labels:
    app: lab-5
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: agentgateway-system
  to:
    - group: agentgateway.dev
      kind: AgentgatewayBackend
