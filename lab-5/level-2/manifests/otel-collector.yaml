# Minimal OpenTelemetry Collector that fans:
#   - OTLP gRPC :4317 / HTTP :4318  → Phoenix OTLP gRPC at phoenix.phoenix:4317
#   - Prometheus scrape of Agent Sandbox runtimes (port 9464 by convention when
#     opentelemetry-instrument is configured with the prometheus exporter)
#       → Phoenix doesn't ingest metrics today, so we also expose them on
#         :8889 (Collector's prometheus exporter) for kubectl-side inspection.
#
# Apply this if you want to:
#   - centralise OTLP from many MCP/agent processes through one endpoint
#   - scrape Sandbox runtime metrics referenced in
#     https://agent-sandbox.sigs.k8s.io/docs/sandbox/metrics/
---
apiVersion: v1
kind: Namespace
metadata:
  name: phoenix
  labels:
    app.kubernetes.io/part-of: lab-5
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: phoenix
data:
  config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318
      prometheus:
        config:
          scrape_configs:
          - job_name: agent-sandbox-runtimes
            kubernetes_sd_configs:
            - role: pod
            relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: "true"
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              target_label: __address__
              regex: (.+)
              replacement: $${1}
            - source_labels: [__meta_kubernetes_namespace]
              target_label: k8s_namespace
            - source_labels: [__meta_kubernetes_pod_name]
              target_label: k8s_pod_name

    processors:
      batch: {}
      memory_limiter:
        check_interval: 5s
        limit_mib: 256

    exporters:
      # Spans → Phoenix (gRPC OTLP). `tls.insecure: true` because Phoenix in
      # the lab chart is plain HTTP.
      otlp/phoenix:
        endpoint: phoenix-svc.phoenix.svc.cluster.local:4317
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/phoenix]
        metrics:
          receivers: [otlp, prometheus]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: otel-collector
  namespace: phoenix
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: otel-collector-discovery
rules:
- apiGroups: [""]
  resources: ["nodes", "nodes/metrics", "services", "endpoints", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: otel-collector-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: otel-collector-discovery
subjects:
- kind: ServiceAccount
  name: otel-collector
  namespace: phoenix
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otel-collector
  namespace: phoenix
  labels:
    app: otel-collector
spec:
  replicas: 1
  selector:
    matchLabels:
      app: otel-collector
  template:
    metadata:
      labels:
        app: otel-collector
    spec:
      serviceAccountName: otel-collector
      containers:
      - name: collector
        image: otel/opentelemetry-collector-contrib:0.115.1
        args: ["--config=/etc/otel/config.yaml"]
        ports:
        - containerPort: 4317
          name: otlp-grpc
        - containerPort: 4318
          name: otlp-http
        - containerPort: 8889
          name: prom-export
        volumeMounts:
        - name: config
          mountPath: /etc/otel
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: config
        configMap:
          name: otel-collector-config
---
apiVersion: v1
kind: Service
metadata:
  name: otel-collector
  namespace: phoenix
  labels:
    app: otel-collector
spec:
  selector:
    app: otel-collector
  ports:
  - port: 4317
    targetPort: 4317
    name: otlp-grpc
  - port: 4318
    targetPort: 4318
    name: otlp-http
  - port: 8889
    targetPort: 8889
    name: prom-export
