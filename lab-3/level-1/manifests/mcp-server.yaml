apiVersion: kagent.dev/v1alpha1
kind: MCPServer
metadata:
  name: reliability-mcp-v2
  namespace: kagent
spec:
  transportType: http
  httpTransport:
    path: /mcp
    targetPort: 8000
  deployment:
    # Replace with your image, e.g. ghcr.io/<your-org>/reliability-mcp-v2:v0.1.0
    image: ghcr.io/REPLACE_ORG/reliability-mcp-v2:latest
    port: 8000
    args:
      - --port
      - "8000"
      - --transport
      - streamableHttp
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 300m
        memory: 256Mi
---
apiVersion: kagent.dev/v1alpha2
kind: RemoteMCPServer
metadata:
  name: reliability-mcp-v2
  namespace: kagent
spec:
  description: "Reliability tools v2 — HTTP/TCP probes, error budget, severity classifier"
  protocol: STREAMABLE_HTTP
  url: http://reliability-mcp-v2.kagent:8000/mcp
  timeout: 30s
  sseReadTimeout: 5m0s
